name: Archive repo traffic

on:
  schedule:
    # Daily at 03:17 UTC. GitHub Actions cron is best-effort and may skip
    # runs under load — daily gives slack so we never miss a 14-day window.
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: traffic-archive
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install chart dependencies
        run: pip install --quiet matplotlib

      - name: Fetch and merge traffic stats
        env:
          # /traffic/* requires a PAT — GITHUB_TOKEN is rejected even with administration:read
          GITHUB_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: python scripts/collect_traffic.py

      - name: Commit updated history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add traffic/
          if git diff --cached --quiet; then
            echo "No traffic changes to commit."
            exit 0
          fi
          git commit -m "chore(traffic): update clones/views history"
          git push
