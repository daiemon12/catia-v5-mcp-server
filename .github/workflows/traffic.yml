name: Archive repo traffic

on:
  schedule:
    # Runs every 48h at 03:17 UTC (offset to avoid the top-of-hour load spike).
    - cron: "17 3 */2 * *"
  workflow_dispatch:

permissions:
  contents: write
  # Required for /repos/{owner}/{repo}/traffic/* endpoints
  administration: read

concurrency:
  group: traffic-archive
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch and merge traffic stats
        env:
          # /traffic/* requires a PAT — GITHUB_TOKEN is rejected even with administration:read
          GITHUB_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: python scripts/collect_traffic.py

      - name: Commit updated history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add traffic/
          if git diff --cached --quiet; then
            echo "No traffic changes to commit."
            exit 0
          fi
          git commit -m "chore(traffic): update clones/views history"
          git push
